<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="theme-switch-wrapper">
    <label class="theme-toggle" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="icon-box">
            <span id="theme-icon">🌙</span>
        </div>
    </label>
</div>

    <div class="glass-card">
        <div class="scoreboard">
            <div class="score-box p1">
                <span class="label">PLAYER X</span>
                <span id="x-wins" class="score">0</span>
            </div>
            <div class="score-box p2">
                <span class="label">PLAYER O</span>
                <span id="o-wins" class="score">0</span>
            </div>
        </div>

        <h1 id="status">Player X's Turn</h1>

        <div class="board-container">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div id="game-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <h2 id="winner-text">X WINS!</h2>
                    <button id="nextRoundBtn">PLAY AGAIN</button>
                </div>
            </div>
        </div>

        <button id="restartBtn">RESET ALL</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
